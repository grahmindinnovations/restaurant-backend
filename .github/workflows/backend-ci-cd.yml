name: Backend CI & Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-build:
    name: Build backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend-build-and-deploy:
    name: Build & Deploy backend to EC2
    needs: backend-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            grahmind/restaurant-backend:latest
            grahmind/restaurant-backend:${{ github.sha }}

      - name: Verify pushed image
        run: docker pull grahmind/restaurant-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker image prune -f
            sudo docker pull grahmind/restaurant-backend:latest
            sudo docker stop restaurant-backend || true
            sudo docker rm restaurant-backend || true
            for c in $(sudo docker ps -q 2>/dev/null); do sudo docker port "$c" 2>/dev/null | grep -q 5180 && sudo docker stop "$c" || true; done
            command -v pm2 >/dev/null 2>&1 && pm2 stop all 2>/dev/null || true
            sudo fuser -k 5180/tcp 2>/dev/null || true
            sudo docker run -d --name restaurant-backend --restart always -p 5180:5180 \
              -e PORT="${{ secrets.PORT }}" \
              -e NODE_ENV="${{ secrets.NODE_ENV }}" \
              -e FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              -e FIREBASE_SERVICE_ACCOUNT_JSON="${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" \
              grahmind/restaurant-backend:latest

